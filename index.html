```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Build Chat App</title>
    <style>
        /* Mobile-First Layout Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; background: #f4f4f4; }

        /* App Container */
        #app-container { display: flex; min-height: 100vh; width: 100%; }

        /* Sidebar */
        #sidebar { width: 250px; background: #2c3e50; color: white; display: flex; flex-direction: column; padding: 10px; }

        /* Main Chat Area */
        #chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* Message Bubbles */
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; }
        .user { align-self: flex-end; background: #3498db; color: white; }
        .ai { align-self: flex-start; background: #e0e0e0; color: #333; }

        /* Sticky Input */
        #input-area { background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }

        /* Loading Overlay */
        #loading { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading">Loading App...</div>

    <div id="app-container">
        <aside id="sidebar">
            <h3>History</h3>
            <button onclick="alert('New Chat')">New Chat</button>
        </aside>

        <main id="chat-main">
            <div id="messages">
                <div class="msg ai">Hello! How can I help you today?</div>
            </div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </main>
    </div>

    <script>
        // Initialization Logic
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loading');
            loader.style.display = 'none';
        });

        function sendMessage() {
            const input = document.getElementById('user-input');
            const messages = document.getElementById('messages');
            
            if (input.value.trim() === "") return;

            // Append User Message
            const userMsg = document.createElement('div');
            userMsg.className = 'msg user';
            userMsg.innerText = input.value;
            messages.appendChild(userMsg);

            // Mock AI Response
            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai';
            aiMsg.innerText = "I received: " + input.value;
            messages.appendChild(aiMsg);

            input.value = '';
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
